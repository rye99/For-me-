<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Love Message</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fff0f5;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            min-width: 300px;
        }

        button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #c9184a;
            transform: scale(1.1);
        }

        .hidden { display: none; }

        #messageText {
            font-size: 30px;
            color: #ff4d6d;
            font-weight: bold;
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        .heart {
            position: absolute;
            top: -10%;
            color: #ff4d6d;
            font-size: 25px;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="container" id="mainBox">
    <div id="step1">
        <button onclick="showStep('step2')">Click me</button>
    </div>

    <div id="step2" class="hidden">
        <button onclick="revealLove()">Open</button>
        <button onclick="showStep('step3')">I don't want</button>
    </div>

    <div id="step3" class="hidden">
        <button onclick="revealLove()">Please open</button>
        <button onclick="showStep('step4')">I don't want to open</button>
    </div>

    <div id="step4" class="hidden">
        <button onclick="revealLove()">I'm opening</button>
        <button onclick="revealLove()">Okey fine let me open</button>
    </div>

    <div id="finalMessage" class="hidden">
        <div id="messageText">i love you so much 💓💓</div>
    </div>
</div>

<script>
    function showStep(stepId) {
        // Saare steps ko hide karo
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step4').classList.add('hidden');
        
        // Sirf wahi step dikhao jo chahiye
        document.getElementById(stepId).classList.remove('hidden');
    }

    function revealLove() {
        // Buttons ko gayab karo aur message dikhao
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step4').classList.add('hidden');
        
        document.getElementById('finalMessage').classList.remove('hidden');
        
        // Hearts ki baarish shuru
        setInterval(createHeart, 200);
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4000);
    }
</script>

</body>
</html>
