<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <style>
        body { background-color: #ffeef2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 80%; }
        h1 { color: #d63384; }
        .heart { font-size: 50px; animation: beat 0.8s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        .btn { background: #ff4b6e; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">❤️</div>
        <h1>Surprise!</h1>
        <p>I just wanted to make something special for you.</p>
        <button class="btn" onclick="alert('I Love You So Much! ❤️')">Click for Message</button>
    </div>
</body>
</html>
